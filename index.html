<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Show Image on Click</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            background-color: #f2f2f2;
        }

        button {
            padding: 15px 30px;
            font-size: 20px;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            background-color: #007BFF;
            color: white;
        }

        button:hover {
            background-color: #0056b3;
        }

        img {
            display: none;
            margin-top: 30px;
            width: 400px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <h1>Click the Button!</h1>

    <button onclick="showImage()">Click Me</button>

    <br>

    <img id="myImage" src="https://cdn.displate.com/artwork/270x380/2025-01-07/be871d2c-f7c8-4a4e-89cb-94d6cbeb6638.jpg" alt="Random Image">

    <script>
        function showImage() {
            document.getElementById("myImage").style.display = "block";
        }
    </script>

</body>
</html>
